    <text x="125" y="356" fill="#B9D3F0" font-family="Segoe UI, Arial" font-size="20">Nuevo lead</text>

    <rect x="430" y="260" width="250" height="140" rx="20" fill="#1A3E4B" stroke="#54E4D1"/>
