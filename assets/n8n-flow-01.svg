      <stop stop-color="#0A1428"/>
      <stop offset="1" stop-color="#12233D"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#34D6FF"/>
      <stop offset="1" stop-color="#6DFFB8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
