    <text x="465" y="356" fill="#B9D3F0" font-family="Segoe UI, Arial" font-size="20">Clasifica</text>

    <rect x="770" y="260" width="250" height="140" rx="20" fill="#21324F" stroke="#86A8FF"/>
    <text x="805" y="320" fill="#EAF4FF" font-family="Segoe UI, Arial" font-size="28" font-weight="700">CRM Upsert</text>
    <text x="805" y="356" fill="#B9D3F0" font-family="Segoe UI, Arial" font-size="20">Actualiza ficha</text>

    <rect x="1110" y="260" width="250" height="140" rx="20" fill="#3C295E" stroke="#C48DFF"/>
    <text x="1145" y="320" fill="#EAF4FF" font-family="Segoe UI, Arial" font-size="28" font-weight="700">Email</text>
    <text x="1145" y="356" fill="#B9D3F0" font-family="Segoe UI, Arial" font-size="20">Confirmacion</text>
